    <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <path id="ctp" d="M 100,36 A 64,64 0 1,1 99.999,36" fill="none"/>
  </defs>

  <circle cx="100" cy="100" r="68" fill="#d8f536"/>

    <textPath href="#ctp" startOffset="0%" text-anchor="middle">HOLASJDAAAAACCESIBILITY</textPath>
  </text>

  <!-- Texto abajo, centrado en 50% -->
  <text font-size="9" fill="#222" font-family="monospace" font-weight="900" letter-spacing="1.5">
    <textPath href="#ctp" startOffset="50%" text-anchor="middle">ACCESSIBILITY</textPath>
  </text>

  <!-- Separadores a los lados -->
  <text font-size="10" fill="#222" font-family="monospace" font-weight="900">
    <textPath href="#ctp" startOffset="25%" text-anchor="middle">✦</textPath>
  </text>
  <text font-size="10" fill="#222" font-family="monospace" font-weight="900">
